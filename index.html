<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinity Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* coral pink palette around #f9becc */
    --c1: #f9becc;  /* primary coral pink */
    --c2: #fcd5ce;  /* peach cream */
    --c3: #f4a6b8;  /* deeper pink */
    --c4: #e8c4d8;  /* pink-lavender */
    --c5: #c9b1d4;  /* soft lavender */
    --c6: #fbe0d6;  /* cream blush */
    --c7: #b8d8d8;  /* dusty mint accent */

    --text: #5c2e3e;      /* deep rose-brown */
    --text-soft: #8a5566; /* muted rose */
    --text-mute: #b08494; /* light rose */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; min-height: 100vh; }

  body {
    font-family: 'Manrope', -apple-system, sans-serif;
    color: var(--text);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .wrap {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .stage {
    position: relative;
    width: 100%;
    aspect-ratio: 400 / 220;
  }

  .inf-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    filter: drop-shadow(0 14px 28px rgba(249, 190, 204, 0.35));
  }

  .playing .inf-svg { animation: breathe 4s ease-in-out infinite; }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.015); }
  }

  .star-btn {
    cursor: pointer;
    transform-box: fill-box;
    transform-origin: center;
    transition: filter 0.3s ease;
  }
  .star-btn:hover { filter: brightness(1.08) drop-shadow(0 0 14px rgba(244, 166, 184, 0.6)); }

  .playing .star-btn { animation: spin 22s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .star-glow {
    transform-box: fill-box;
    transform-origin: center;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 0.85; transform: scale(1.15); }
  }

  .playing .playhead { animation: playheadPulse 1.2s ease-in-out infinite; }
  @keyframes playheadPulse {
    0%, 100% { r: 5; }
    50% { r: 6.5; }
  }

  /* mini controls — collapsed circle, expand on hover */
  .mini-controls {
    position: relative;
    z-index: 5;
    margin-top: -56px;
    margin-bottom: 8px;
    height: 34px;
    width: 34px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    overflow: hidden;
    padding: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(252, 213, 206, 0.4) 100%);
    backdrop-filter: blur(16px) saturate(170%);
    -webkit-backdrop-filter: blur(16px) saturate(170%);
    border: 1px solid rgba(249, 190, 204, 0.55);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.6),
      0 4px 14px rgba(244, 166, 184, 0.25);
    transition: width 0.45s cubic-bezier(.5,.05,.2,1), padding 0.45s cubic-bezier(.5,.05,.2,1);
    cursor: pointer;
  }

  .mini-controls:hover {
    width: 168px;
    padding: 0 6px;
    cursor: default;
  }

  /* collapsed state: show a single hint dot/icon in the center */
  .hint {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    pointer-events: none;
    color: var(--text-soft);
    opacity: 1;
    transition: opacity 0.2s ease;
  }
  .hint svg { width: 13px; height: 13px; }
  .mini-controls:hover .hint { opacity: 0; }

  .mini-row {
    display: flex;
    align-items: center;
    gap: 2px;
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.3s ease 0.12s, transform 0.35s cubic-bezier(.34,1.56,.64,1) 0.1s;
    width: 100%;
    justify-content: space-between;
  }
  .mini-controls:hover .mini-row {
    opacity: 1;
    transform: translateX(0);
  }

  .mini {
    width: 26px; height: 26px;
    flex-shrink: 0;
    border-radius: 50%;
    background: transparent;
    border: none;
    color: var(--text-soft);
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
  }
  .mini:hover {
    color: var(--text);
    background: rgba(249, 190, 204, 0.45);
    transform: translateY(-1px);
  }
  .mini:active { transform: scale(0.88); }
  .mini svg { width: 11px; height: 11px; }

  .mini.toggle.active {
    color: #fff;
    background: linear-gradient(135deg, var(--c3), var(--c5));
    box-shadow: 0 0 8px rgba(244, 166, 184, 0.6);
  }

  .track {
    text-align: center;
    min-height: 44px;
  }
  .title {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-style: italic;
    font-size: 20px;
    letter-spacing: -0.2px;
    color: var(--text);
    margin-bottom: 3px;
  }
  .artist {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-soft);
    letter-spacing: 2.4px;
    text-transform: uppercase;
  }

  .times {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    color: var(--text-mute);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.6px;
    font-weight: 500;
  }
  .sep {
    width: 70px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(176, 132, 148, 0.4), transparent);
  }
</style>
</head>
<body>
<div class="wrap" id="wrap">

  <div class="stage">
    <svg class="inf-svg" viewBox="0 0 400 220" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="gMain" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0"    stop-color="#fbe0d6"/>
          <stop offset="0.2"  stop-color="#f9becc"/>
          <stop offset="0.45" stop-color="#f4a6b8"/>
          <stop offset="0.7"  stop-color="#e8c4d8"/>
          <stop offset="0.9"  stop-color="#c9b1d4"/>
          <stop offset="1"    stop-color="#fbe0d6"/>
          <animateTransform attributeName="gradientTransform" type="translate"
            from="-1 0" to="1 0" dur="6s" repeatCount="indefinite"/>
        </linearGradient>

        <linearGradient id="gAlt" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0"    stop-color="#c9b1d4"/>
          <stop offset="0.33" stop-color="#f9becc"/>
          <stop offset="0.66" stop-color="#fcd5ce"/>
          <stop offset="1"    stop-color="#e8c4d8"/>
          <animateTransform attributeName="gradientTransform" type="translate"
            from="1 0" to="-1 0" dur="8s" repeatCount="indefinite"/>
        </linearGradient>

        <linearGradient id="gPlayed" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0"   stop-color="#ffffff"/>
          <stop offset="0.4" stop-color="#f9becc"/>
          <stop offset="0.8" stop-color="#f4a6b8"/>
          <stop offset="1"   stop-color="#c9b1d4"/>
        </linearGradient>

        <path id="inf"
          d="M 60 110
             C 60 30, 150 30, 200 110
             C 250 190, 340 190, 340 110
             C 340 30, 250 30, 200 110
             C 150 190, 60 190, 60 110 Z"/>

        <filter id="blurBig" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="5"/>
        </filter>
        <filter id="blurMed" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="2.5"/>
        </filter>
      </defs>

      <!-- outer soft halo -->
      <use href="#inf" fill="none" stroke="url(#gMain)" stroke-width="32"
           stroke-linecap="round" stroke-linejoin="round"
           opacity="0.4" filter="url(#blurBig)"/>

      <!-- subtle depth shadow (warm, light) -->
      <use href="#inf" fill="none" stroke="#c77d95" stroke-width="12"
           stroke-linecap="round" stroke-linejoin="round"
           opacity="0.18" transform="translate(0, 4)" filter="url(#blurMed)"/>

      <!-- thick base ribbon -->
      <use href="#inf" fill="none" stroke="url(#gMain)" stroke-width="15"
           stroke-linecap="round" stroke-linejoin="round"
           opacity="0.95"/>

      <!-- medium ribbon, offset up -->
      <use href="#inf" fill="none" stroke="url(#gAlt)" stroke-width="8"
           stroke-linecap="round" stroke-linejoin="round"
           opacity="0.95" transform="translate(0, -1.8)"/>

      <!-- thin accent -->
      <use href="#inf" fill="none" stroke="url(#gMain)" stroke-width="4"
           stroke-linecap="round" stroke-linejoin="round"
           opacity="0.85" transform="translate(0, -3)"/>

      <!-- white top highlight (creates 3D bevel on light bg) -->
      <use href="#inf" fill="none" stroke="#ffffff" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round"
           opacity="0.85" transform="translate(0, -4.8)"/>

      <!-- played progress -->
      <use id="played" href="#inf" fill="none" stroke="url(#gPlayed)" stroke-width="7"
           stroke-linecap="round" stroke-linejoin="round"
           opacity="0.98" stroke-dasharray="0 9999"
           style="filter: drop-shadow(0 0 4px #fff) drop-shadow(0 0 10px rgba(244, 166, 184, 0.8));"/>

      <!-- seek hit area -->
      <use id="hit" href="#inf" fill="none" stroke="transparent" stroke-width="34"
           style="cursor: pointer; pointer-events: stroke;"/>

      <!-- playhead -->
      <circle id="playhead" class="playhead" cx="60" cy="110" r="5" fill="#ffffff"
              style="filter: drop-shadow(0 0 6px #fff) drop-shadow(0 0 12px #f4a6b8) drop-shadow(0 0 18px rgba(249, 190, 204, 0.8)); pointer-events: none;"/>

      <!-- sparkle dots -->
      <circle cx="72" cy="68" r="1" fill="#f4a6b8" opacity="0.7"/>
      <circle cx="328" cy="170" r="1.2" fill="#c9b1d4" opacity="0.7"/>
      <circle cx="342" cy="48" r="0.8" fill="#f9becc" opacity="0.6"/>
      <circle cx="58" cy="182" r="0.9" fill="#f4a6b8" opacity="0.65"/>
      <circle cx="195" cy="32" r="0.7" fill="#c9b1d4" opacity="0.55"/>
      <circle cx="210" cy="200" r="0.7" fill="#f9becc" opacity="0.55"/>

      <!-- center star -->
      <g class="star-btn" id="starBtn">
        <circle class="star-glow" cx="200" cy="110" r="32"
                fill="url(#gMain)" opacity="0.65" filter="url(#blurBig)"/>
        <path d="M 200 74 C 204 104, 210 106, 236 110 C 210 114, 204 116, 200 146 C 196 116, 190 114, 164 110 C 190 106, 196 104, 200 74 Z"
              fill="url(#gMain)" opacity="0.75" filter="url(#blurMed)"/>
        <path d="M 200 80 C 203 104, 208 107, 230 110 C 208 113, 203 116, 200 140 C 197 116, 192 113, 170 110 C 192 107, 197 104, 200 80 Z"
              fill="#ffffff" opacity="0.98"
              style="filter: drop-shadow(0 0 5px rgba(255,255,255,0.95)) drop-shadow(0 0 12px rgba(244, 166, 184, 0.7));"/>
        <circle cx="200" cy="110" r="2.8" fill="#fff"
                style="filter: drop-shadow(0 0 4px #fff) drop-shadow(0 0 8px #f4a6b8);"/>
        <line x1="200" y1="68" x2="200" y2="76" stroke="#f4a6b8" stroke-width="1" stroke-linecap="round" opacity="0.9"/>
        <line x1="200" y1="144" x2="200" y2="152" stroke="#f4a6b8" stroke-width="1" stroke-linecap="round" opacity="0.9"/>
        <line x1="158" y1="110" x2="166" y2="110" stroke="#f4a6b8" stroke-width="1" stroke-linecap="round" opacity="0.9"/>
        <line x1="234" y1="110" x2="242" y2="110" stroke="#f4a6b8" stroke-width="1" stroke-linecap="round" opacity="0.9"/>
      </g>
    </svg>
  </div>

  <!-- collapsed→expand controls -->
  <div class="mini-controls" id="miniControls">
    <div class="hint">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <circle cx="5" cy="12" r="1.6"/>
        <circle cx="12" cy="12" r="1.6"/>
        <circle cx="19" cy="12" r="1.6"/>
      </svg>
    </div>
    <div class="mini-row">
      <button class="mini" id="prev" title="이전">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <polygon points="18,5 7,12 18,19"/>
          <rect x="4" y="5" width="2.2" height="14" rx="1"/>
        </svg>
      </button>
      <button class="mini toggle" id="repeat" title="반복">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9"/>
          <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/>
          <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>
      <button class="mini toggle" id="shuffle" title="셔플">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 3 21 3 21 8"/>
          <line x1="4" y1="20" x2="21" y2="3"/>
          <polyline points="21 16 21 21 16 21"/>
          <line x1="15" y1="15" x2="21" y2="21"/>
          <line x1="4" y1="4" x2="9" y2="9"/>
        </svg>
      </button>
      <button class="mini" id="next" title="다음">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <polygon points="6,5 17,12 6,19"/>
          <rect x="17.8" y="5" width="2.2" height="14" rx="1"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="track">
    <div class="title" id="title">Infinite Flow</div>
    <div class="artist" id="artist">COSMIC WAVES</div>
  </div>

  <div class="times">
    <span id="cur">0:00</span>
    <span class="sep"></span>
    <span id="dur">3:45</span>
  </div>
</div>

<script>
(() => {
  const tracks = [
    { title: 'Infinite Flow',   artist: 'COSMIC WAVES', duration: 225 },
    { title: 'Astral Drift',    artist: 'NEBULA SOUND', duration: 198 },
    { title: 'Pastel Horizon',  artist: 'AURORA',       duration: 243 },
    { title: 'Silent Orbit',    artist: 'MOONLIT',      duration: 176 },
    { title: 'Lucid Reverie',   artist: 'DREAM LINE',   duration: 211 }
  ];

  const $ = id => document.getElementById(id);
  const wrap = $('wrap');
  const title = $('title'), artist = $('artist');
  const cur = $('cur'), dur = $('dur');
  const played = $('played');
  const playhead = $('playhead');
  const hit = $('hit');
  const starBtn = $('starBtn');
  const svg = document.querySelector('.inf-svg');
  const infPath = document.getElementById('inf');
  const totalLen = infPath.getTotalLength();

  let idx = 0;
  let t = 0;
  let playing = false;
  let repeat = false;
  let shuffle = false;
  let ticker = null;

  const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;

  function render() {
    const tr = tracks[idx];
    title.textContent = tr.title;
    artist.textContent = tr.artist;
    dur.textContent = fmt(tr.duration);
    cur.textContent = fmt(t);

    const ratio = Math.min(1, Math.max(0, t / tr.duration));
    const playedLen = ratio * totalLen;

    played.setAttribute('stroke-dasharray', `${playedLen} ${totalLen + 10}`);

    const pt = infPath.getPointAtLength(playedLen);
    playhead.setAttribute('cx', pt.x);
    playhead.setAttribute('cy', pt.y);
  }

  function togglePlay() {
    playing = !playing;
    if (playing) {
      wrap.classList.add('playing');
      ticker = setInterval(tick, 1000);
    } else {
      wrap.classList.remove('playing');
      clearInterval(ticker);
    }
  }

  function tick() {
    const tr = tracks[idx];
    t += 1;
    if (t >= tr.duration) {
      if (repeat) t = 0;
      else { doNext(); return; }
    }
    render();
  }

  function doNext() {
    idx = shuffle
      ? (tracks.length > 1
          ? (idx + 1 + Math.floor(Math.random() * (tracks.length - 1))) % tracks.length
          : 0)
      : (idx + 1) % tracks.length;
    t = 0;
    render();
  }

  function doPrev() {
    if (t > 3) t = 0;
    else { idx = (idx - 1 + tracks.length) % tracks.length; t = 0; }
    render();
  }

  function svgPoint(evt) {
    const pt = svg.createSVGPoint();
    pt.x = evt.clientX;
    pt.y = evt.clientY;
    const ctm = svg.getScreenCTM();
    if (!ctm) return null;
    return pt.matrixTransform(ctm.inverse());
  }

  function nearestLength(x, y) {
    let bestLen = 0, bestDist = Infinity;
    const samples = 260;
    for (let i = 0; i <= samples; i++) {
      const L = (i / samples) * totalLen;
      const p = infPath.getPointAtLength(L);
      const d = (p.x - x) ** 2 + (p.y - y) ** 2;
      if (d < bestDist) { bestDist = d; bestLen = L; }
    }
    const step = totalLen / samples;
    for (let i = -4; i <= 4; i++) {
      const L = Math.max(0, Math.min(totalLen, bestLen + (i * step / 4)));
      const p = infPath.getPointAtLength(L);
      const d = (p.x - x) ** 2 + (p.y - y) ** 2;
      if (d < bestDist) { bestDist = d; bestLen = L; }
    }
    return bestLen;
  }

  hit.addEventListener('click', e => {
    const p = svgPoint(e);
    if (!p) return;
    const L = nearestLength(p.x, p.y);
    const ratio = L / totalLen;
    t = Math.floor(tracks[idx].duration * ratio);
    render();
  });

  starBtn.addEventListener('click', e => {
    e.stopPropagation();
    togglePlay();
  });

  $('next').addEventListener('click', doNext);
  $('prev').addEventListener('click', doPrev);
  $('repeat').addEventListener('click', () => {
    repeat = !repeat;
    $('repeat').classList.toggle('active', repeat);
  });
  $('shuffle').addEventListener('click', () => {
    shuffle = !shuffle;
    $('shuffle').classList.toggle('active', shuffle);
  });

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    else if (e.code === 'ArrowRight') doNext();
    else if (e.code === 'ArrowLeft') doPrev();
  });

  render();
})();
</script>
</body>
</html>
